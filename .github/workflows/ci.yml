name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  AI_PROVIDER: mock
  AI_SUMMARY_PROVIDER: mock
  ELASTICSEARCH_URL: http://localhost:9200
  KAFKA_BOOTSTRAP_SERVERS: localhost:19092

jobs:
  compose-validation:
    name: Docker Compose validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate default Compose configuration
        run: docker compose config

      - name: Validate tools profile Compose configuration
        run: docker compose --profile tools config

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Run backend tests
        working-directory: backend
        run: pytest

  worker-tests:
    name: Worker tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install worker dependencies
        working-directory: worker
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Run worker tests
        working-directory: worker
        run: pytest

  event-generator-tests:
    name: Event generator tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install event generator dependencies
        working-directory: event-generator
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Run event generator tests
        working-directory: event-generator
        run: pytest

  frontend-tests:
    name: Frontend tests and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:run

      - name: Build frontend
        working-directory: frontend
        run: npm run build
